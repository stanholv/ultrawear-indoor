<!doctype html>
<html lang="nl" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Ultrawear Indoor - Minivoetbal statistieken en wedstrijd tracking" />
    <meta name="theme-color" content="#C8102E" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Ultrawear" />
    <title>Ultrawear Indoor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Capture the install prompt as early as possible — it can fire before
      // React mounts. Stored for the InstallBanner to pick up.
      window.addEventListener('beforeinstallprompt', function (e) {
        e.preventDefault();
        window.__deferredPrompt = e;
        window.dispatchEvent(new Event('pwa-prompt-ready'));
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
