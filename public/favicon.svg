      <line x1="-57.06" y1="-18.54" x2="-142.66" y2="-46.35"/>
    </g>
    <!-- partial edge pentagons (hints) -->
    <g fill="#111">
      <circle cx="0" cy="-150" r="13"/>
      <circle cx="142.66" cy="-46.35" r="13"/>
      <circle cx="88.17" cy="121.35" r="13"/>
      <circle cx="-88.17" cy="121.35" r="13"/>
      <circle cx="-142.66" cy="-46.35" r="13"/>
    </g>
